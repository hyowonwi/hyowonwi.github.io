    About:
      - I am currently a Ph.D. student in the School of Computing at KAIST. I received my B.S. and M.S. in Computer Science from Yonsei University. My research interests include Transformer architectures and parameter-efficient fine-tuning (PEFT) techniques for LLMs, as well as efficiency-oriented design for LLM inference and training.

